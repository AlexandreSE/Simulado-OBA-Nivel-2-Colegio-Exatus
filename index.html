            display: flex;
            justify-content: center;

            min-height: 100vh;
            background-image: radial-gradient(white, rgba(255, 255, 255, .2) 2px, transparent 40px);

        }

        #app-container {
            background: rgba(20, 25, 45, 0.95);
            width: 95%;
            max-width: 700px;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--star-gold);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: var(--star-gold);
            margin-top: 0;
        }

        .hidden {
            display: none;
        }

        .btn {
            background: var(--earth-blue);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s, background 0.3s;
        }

        .btn:hover {
            background: #1557b0;
            transform: scale(1.05);
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--star-gold);
            color: white;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
            font-size: 1em;
        }

        .option-btn:hover {
            background: rgba(255, 215, 0, 0.1);
        }

        .correct {
            background: #2e7d32 !important;
            border-color: #4caf50;
        }

        .wrong {
            background: #c62828 !important;
            border-color: #f44336;
        }

        #feedback {
            font-weight: bold;
            margin: 15px 0;
            min-height: 24px;
        }

        .progress-bar {
            height: 12px;
            background: #333;
            border-radius: 6px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--star-gold);
            width: 0%;
            transition: width 0.3s;
        }

        .review-item {
            text-align: left;
            border-bottom: 1px solid #444;
            padding: 15px 0;
        }

        .review-q {
            color: var(--star-gold);
            font-weight: bold;
            margin-bottom: 5px;
        }
    </style>
</head>

        let currentQuestions = [];
        let currentIdx = 0;
        let score = 0;
        let userAnswers = [];

        function startQuiz(num) {
            // Embaralhar e selecionar as questões
            currentQuestions = [...questionBank].sort(() => 0.5 - Math.random()).slice(0, num);
            currentIdx = 0;
            score = 0;
            userAnswers = [];
            
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-results').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            document.getElementById('review-container').classList.add('hidden');
            
            showQuestion();
        }

        function showQuestion() {
            const qData = currentQuestions[currentIdx];
            document.getElementById('question-text').innerHTML = `<span style="color:#ffd700;">${currentIdx + 1}.</span> ${qData.q}`;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('next-btn').classList.add('hidden');

            const progressPercent = (currentIdx / currentQuestions.length) * 100;
            document.getElementById('progress-fill').style.width = `${progressPercent}%`;

            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${String.fromCharCode(65+index)} - ${opt}`; // A - , B - , etc.
                btn.onclick = () => checkAnswer(index, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(choice, btn) {
            // Impede que clique novamente depois de responder
            if (!document.getElementById('next-btn').classList.contains('hidden')) return;

            const correctIndex = currentQuestions[currentIdx].correct;
            userAnswers.push(choice);
            const allBtns = document.querySelectorAll('.option-btn');

            if (choice === correctIndex) {
                btn.classList.add('correct');
                document.getElementById('feedback').innerHTML = "✨ Excelente, Comandante! Resposta correta. ✨";
                score++;
            } else {
                btn.classList.add('wrong');
                // Destaca a resposta correta
                allBtns[correctIndex].classList.add('correct');
                document.getElementById('feedback').innerHTML = "🔭 Houston, temos um problema! Veja a resposta correta destacada em verde.";
            }
            
            // Desabilita todos os botões para não deixar trocar a resposta
            allBtns.forEach(b => {
                b.style.pointerEvents = 'none';
                b.style.cursor = 'default';
            });
            
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < currentQuestions.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-results').classList.remove('hidden');
            
            const perc = (score / currentQuestions.length) * 100;
            let msg = perc >= 70 ? "🚀 Pronto para a OBA! Parabéns, comandante!" : "📚 Continue estudando, recruta! Você vai melhorar na próxima missão.";
            let stars = "";
            if (perc >= 90) stars = "🌟🌟🌟🌟🌟";
            else if (perc >= 70) stars = "🌟🌟🌟🌟";
            else if (perc >= 50) stars = "🌟🌟🌟";
            else if (perc >= 25) stars = "🌟🌟";
            else stars = "🌟";
            
            document.getElementById('score-text').innerHTML = `
                <h3>Nota Final: ${score} / ${currentQuestions.length}</h3>
                <p>${msg}</p>
                <p style="font-size: 1.5rem;">${stars}</p>
            `;
            
            // Limpa revisão anterior
            document.getElementById('review-container').innerHTML = '';
            document.getElementById('review-container').classList.add('hidden');
        }

        function showReview() {
            const container = document.getElementById('review-container');
            container.innerHTML = '<h3>📋 Análise Completa da Missão:</h3>';
            
            currentQuestions.forEach((q, i) => {
                const item = document.createElement('div');
                item.className = 'review-item';
                const isCorrect = (userAnswers[i] === q.correct);
                const status = isCorrect ? "✅ ACERTOU" : "❌ ERROU";
                const statusColor = isCorrect ? "#4caf50" : "#f44336";
                
                const userAnswerText = userAnswers[i] !== undefined ? q.options[userAnswers[i]] : "Não respondida";
                const correctAnswerText = q.options[q.correct];
                
                item.innerHTML = `
                    <div class="review-q">${i+1}. ${q.q} <span style="color:${statusColor};">[${status}]</span></div>
                    <div style="font-size: 0.9em; margin-top: 5px;">🔹 <strong>Sua resposta:</strong> ${userAnswerText}</div>
                    <div style="color: #4caf50; font-size: 0.9em; font-weight: bold;">✅ <strong>Gabarito:</strong> ${correctAnswerText}</div>
                `;
                container.appendChild(item);
            });
            
            container.classList.remove('hidden');
            
            // Rola para a revisão
            container.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>
